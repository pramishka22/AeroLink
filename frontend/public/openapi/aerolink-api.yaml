openapi: 3.0.0

info:
  title: AeroLink Airline Systems API
  version: 1.0.0
  description: Cloud-based distributed microservices API for AeroLink airline operations.

servers:
  - url: https://yzyfq3ys00.execute-api.us-east-1.amazonaws.com/prod
    description: AWS API Gateway production endpoint

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: Admin User
              email: admin@aerolink.com
              password: Admin123
              role: admin
      responses:
        "201":
          description: User registered successfully

  /auth/login:
    post:
      summary: Login user and return JWT token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: admin@aerolink.com
              password: Admin123
      responses:
        "200":
          description: Login successful

  /flights:
    get:
      summary: Get all flights
      tags: [Flights]
      security: []
      responses:
        "200":
          description: List of flights

    post:
      summary: Create flight
      tags: [Flights]
      requestBody:
        required: true
        content:
          application/json:
            example:
              flightNumber: AL300
              airline: AeroLink
              from: Dubai
              to: Colombo
              departureTime: "2026-05-28T09:38"
              arrivalTime: "2026-05-28T11:40"
              price: 500
              totalSeats: 85
              status: Scheduled
      responses:
        "201":
          description: Flight created successfully

  /flights/{id}:
    put:
      summary: Update flight schedule, price, or status
      tags: [Flights]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            example:
              price: 550
              status: Delayed
      responses:
        "200":
          description: Flight updated successfully

  /bookings:
    get:
      summary: Get all bookings
      tags: [Bookings]
      responses:
        "200":
          description: List of bookings

    post:
      summary: Create a booking
      tags: [Bookings]
      requestBody:
        required: true
        content:
          application/json:
            example:
              flightId: "1"
              seatsBooked: 1
              paymentStatus: PAYMENT_APPROVED
              paymentMethod: Simulated Stripe Provider
              transactionRef: TXN-1780032788503
      responses:
        "201":
          description: Booking created successfully

  /baggage:
    get:
      summary: Get baggage records
      tags: [Baggage]
      responses:
        "200":
          description: List of baggage records

    post:
      summary: Create baggage record
      tags: [Baggage]
      requestBody:
        required: true
        content:
          application/json:
            example:
              bookingId: "1"
              passengerName: Pramishka
              tagNumber: BAG-AL100-001
      responses:
        "201":
          description: Baggage created successfully

  /baggage/{id}/status:
    put:
      summary: Update baggage status
      tags: [Baggage]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            example:
              status: Arrived at Destination
      responses:
        "200":
          description: Baggage status updated successfully

  /notifications:
    get:
      summary: Get notifications
      tags: [Notifications]
      responses:
        "200":
          description: List of notifications

    post:
      summary: Create notification
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            example:
              type: BAGGAGE_UPDATED
              bookingId: "1"
              message: Baggage status updated
      responses:
        "201":
          description: Notification created successfully

  /payments:
    get:
      summary: Get payment records
      tags: [Payments]
      responses:
        "200":
          description: List of payment records

  /payments/simulate:
    post:
      summary: Simulate payment provider transaction
      tags: [Payments]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              bookingId: TEST-BOOKING-001
              amount: 500
              provider: Simulated Stripe Provider
              cardNumber: "4111111111111111"
      responses:
        "201":
          description: Payment approved

  /checkins:
    get:
      summary: Get passenger check-ins
      tags: [Check-In]
      responses:
        "200":
          description: List of passenger check-ins

    post:
      summary: Passenger check-in and boarding pass generation
      tags: [Check-In]
      requestBody:
        required: true
        content:
          application/json:
            example:
              bookingId: TEST-BOOKING-001
              flightId: "1"
              passengerName: Pramishka
      responses:
        "201":
          description: Check-in completed successfully

  /airport/events:
    get:
      summary: Retrieve airport operational events
      tags: [Airport Integration]
      responses:
        "200":
          description: List of airport events

    post:
      summary: Create airport operational event
      tags: [Airport Integration]
      requestBody:
        required: true
        content:
          application/json:
            example:
              flightId: "1"
              airportCode: CMB
              gate: G12
              status: BOARDING_OPEN
              message: Boarding opened at Colombo International Airport
      responses:
        "201":
          description: Airport event recorded successfully

  /immigration/verify:
    get:
      summary: Retrieve immigration verification records
      tags: [Immigration Integration]
      responses:
        "200":
          description: List of immigration verification records

    post:
      summary: Verify passenger immigration clearance
      tags: [Immigration Integration]
      requestBody:
        required: true
        content:
          application/json:
            example:
              bookingId: TEST-BOOKING-001
              passengerName: Pramishka
              passportNumber: N1234567
              nationality: Sri Lankan
      responses:
        "201":
          description: Passenger immigration clearance verified

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT